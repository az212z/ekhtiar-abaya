<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصفحة غير موجودة | الأختيار المُبهِر للعبايات</title>
<meta name="theme-color" content="#2B2A2E">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=Tajawal:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:"IBM Plex Sans Arabic",sans-serif;background:#F5F1EB;color:#2B2A2E;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;
  }
  .wrap{max-width:480px}
  .mark{
    width:64px;height:64px;border-radius:14px;background:#2B2A2E;color:#CBB89C;
    display:grid;place-items:center;font-family:"Tajawal",sans-serif;font-weight:800;font-size:2rem;margin:0 auto 28px;
  }
  .code{font-family:"Tajawal",sans-serif;font-size:4.5rem;font-weight:900;color:#CBB89C;line-height:1}
  h1{font-family:"Tajawal",sans-serif;font-size:1.5rem;margin:10px 0 12px;color:#2B2A2E}
  p{color:#6E665E;margin-bottom:30px;line-height:1.8}
  a{
    display:inline-flex;align-items:center;gap:9px;background:#2B2A2E;color:#F5F1EB;
    padding:14px 30px;border-radius:4px;font-weight:700;text-decoration:none;transition:.3s;
  }
  a:hover{background:#3A383E;transform:translateY(-2px)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">أ</div>
    <div class="code">404</div>
    <h1>عذرًا، الصفحة غير موجودة</h1>
    <p>يبدو أن الرابط الذي تبحث عنه غير متاح. لنعد بك إلى تشكيلتنا.</p>
    <a href="index.html">العودة للرئيسية</a>
  </div>
</body>
</html>
